# ================================
# Basic webserv configuration
# ================================

server {
    listen 8080;
    host 127.0.0.1;
    server_name localhost;

    root www;
    index index.html;

    error_page 404 /errors/404.html;
    error_page 500 /errors/500.html d;

    client_max_body_size 1000000;

    location / {
        methods GET;
        autoindex off;
    }

    location /upload {
        methods POST;
        root uploads;
    }
}